<!-- Theme Toggle Button -->
<div class="fixed top-6 right-6 z-50">
  <button
    (click)="toggleTheme()"
    class="relative inline-flex h-8 w-16 items-center rounded-full bg-gray-600 transition duration-300 focus:outline-none"
    [class.bg-indigo-500]="!themeService.isDark"
  >
    <span
      class="absolute left-1 inline-block h-6 w-6 transform rounded-full bg-white transition-transform duration-300"
      [class.translate-x-8]="!themeService.isDark"
    ></span>

    <!-- Icons -->
    <span class="absolute left-2 text-yellow-400 text-xs" *ngIf="themeService.isDark">☾</span>
    <span class="absolute right-2 text-white text-xs" *ngIf="!themeService.isDark">☀</span>
  </button>
</div>
